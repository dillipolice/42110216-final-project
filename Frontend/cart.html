<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      background: #e67e22;   
      color: white;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2em;
      margin: 0;
    }

    .header-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      background: #2980b9;
      color: white;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95em;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #d35400;
    }

    .danger-btn {
      background: #2980b9;
    }

    .danger-btn:hover {
      background: #a93226;
    }

    .cart-container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
      flex-wrap: wrap;
    }

    .total {
      font-size: 1.2em;
      text-align: right;
      margin-top: 15px;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
      .header-buttons {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🛒 Your Cart</h1>
    <div class="header-buttons">
      <button class="btn" onclick="addMore()">➕ Add More</button>
      <button class="btn danger-btn" onclick="clearCart()">🗑️ Clear Cart</button>
      <button class="btn" onclick="checkout()">✅ Place Order</button>
    </div>
  </div>

  <div class="cart-container" id="cartContainer"></div>

  <script>
    const cartContainer = document.getElementById("cartContainer");
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function updateCartUI() {
      cartContainer.innerHTML = "";

      if (cart.length === 0) {
        cartContainer.innerHTML = "<p>No items in cart.</p>";
        return;
      }

      let total = 0;
      cart.forEach((item, index) => {
        total += item.price;
        const itemDiv = document.createElement("div");
        itemDiv.className = "cart-item";
        itemDiv.innerHTML = `
          <span>${item.name} - ₹${item.price.toFixed(2)}</span>
          <button onclick="removeItem(${index})" style="background: #c0392b; color: white; border: none; border-radius: 4px; padding: 4px 8px;">✕</button>
        `;
        cartContainer.appendChild(itemDiv);
      });

      const totalDiv = document.createElement("div");
      totalDiv.className = "total";
      totalDiv.innerHTML = `Total: ₹${total.toFixed(2)}`;
      cartContainer.appendChild(totalDiv);
    }

    function removeItem(index) {
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartUI();
    }

    function checkout() {
      if (cart.length === 0) {
        alert("⚠️ Please add items to your cart before placing an order.");
        return;
      }

      alert("✅ Order Placed Successfully!");
      localStorage.removeItem("cart");
      cart = [];
      updateCartUI();
    }

    function clearCart() {
      if (cart.length === 0) {
        alert("🧺 Your cart is already empty.");
        return;
      }

      if (confirm("Are you sure you want to clear your cart?")) {
        localStorage.removeItem("cart");
        cart = [];
        updateCartUI();
      }
    }

    function addMore() {
      window.location.href = "useraccess.html";
    }

    updateCartUI();
  </script>
</body>
</html>
