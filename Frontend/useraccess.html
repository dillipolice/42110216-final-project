<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buy Fruits</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f4f8fb;
      padding: 20px;
      color: #333;
      animation: fadeIn 1s ease-in;
    }

    h1 {
      background: #d35400;
      color: #fff;
      padding: 15px 20px;
      border-radius: 10px;
      font-size: 2em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .home-button-inside {
      background: linear-gradient(to right, #2980b9, #3498db);
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.9em;
      transition: background 0.3s, transform 0.2s;
    }

    .home-button-inside:hover {
      background: linear-gradient(to right, #e67e22, #d35400);
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .cart-icon {
      font-size: 24px;
      color: white;
      text-decoration: none;
      margin-left: 15px;
      background: #2ecc71;
      padding: 6px 12px;
      border-radius: 30px;
      transition: background 0.3s ease;
    }

    .cart-icon:hover {
      background: #27ae60;
    }

    .fruit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .fruit-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s;
    }

    .fruit-card:hover {
      transform: scale(1.02);
    }

    .fruit-img {
      width: 100%;
      max-width: 150px;
      height: 150px;
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .fruit-card h3 {
      margin: 10px 0 5px;
      color: #2980b9;
      font-size: 1.4em;
      text-transform: capitalize;
    }

    .fruit-card p {
      margin: 4px 0;
      font-size: 1em;
      text-align: center;
    }

    .add-btn {
      background: #d35400;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s ease;
      font-size: 1em;
    }

    .add-btn:hover {
      background: #2ecc71;
    }

    .counter {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .counter button {
      background: #e67e22;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }

    .counter span {
      font-size: 18px;
      font-weight: bold;
    }

    .limit-msg {
      color: red;
      font-weight: bold;
      font-size: 0.9em;
      margin-top: 8px;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      h1 {
        flex-direction: column;
        font-size: 1.5em;
        text-align: center;
      }

      .home-button-inside {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>

  <h1>
    🍎 Welcome to Chandu's Fruit Shop
    <div>
      <a href="USER.html" class="home-button-inside">🏠 Home</a>
      <a href="cart.html" class="cart-icon">🛒 View Cart</a>
    </div>
  </h1>

  <div class="fruit-grid" id="fruitList"></div>

  <script>
    const apiUrl = "http://localhost:8080/api/fruits";
    const fruitListEl = document.getElementById("fruitList");

    function loadFruits() {
      fetch(apiUrl)
        .then(res => res.json())
        .then(fruits => {
          fruitListEl.innerHTML = "";
          fruits.forEach(fruit => {
            const count = getFruitCount(fruit.name);

            const card = document.createElement("div");
            card.className = "fruit-card";
            card.innerHTML = `
              <img src="https://cdn-icons-png.flaticon.com/512/415/415682.png" alt="Fruit Image" class="fruit-img">
              <h3>${fruit.name}</h3>
              <p><strong>Price:</strong> ₹${fruit.price.toFixed(2)}</p>
              <p><strong>Weight:</strong> ${fruit.weight} kg</p>
              <div id="control-${fruit.name}">${getControlHTML(fruit.name, fruit.price, count)}</div>
              <p id="warn-${fruit.name}" class="limit-msg"></p>
            `;
            fruitListEl.appendChild(card);
          });
        })
        .catch(err => {
          fruitListEl.innerHTML = "<p>Error loading fruits.</p>";
          console.error(err);
        });
    }

    function getFruitCount(name) {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      return cart.filter(item => item.name === name).length;
    }

    function getControlHTML(name, price, count) {
      if (count === 0) {
        return `<button class="add-btn" onclick="startCounter('${name}', ${price})">Add to Cart</button>`;
      } else {
        return `
          <div class="counter">
            <button onclick="changeCount('${name}', ${price}, -1)">−</button>
            <span id="count-${name}">${count}</span>
            <button onclick="changeCount('${name}', ${price}, 1)">+</button>
          </div>
        `;
      }
    }

    function startCounter(name, price) {
      const controlDiv = document.getElementById(`control-${name}`);
      controlDiv.innerHTML = `
        <div class="counter">
          <button onclick="changeCount('${name}', ${price}, -1)">−</button>
          <span id="count-${name}">1</span>
          <button onclick="changeCount('${name}', ${price}, 1)">+</button>
        </div>
      `;

      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push({ name, price });
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    function changeCount(name, price, delta) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let count = cart.filter(item => item.name === name).length;
      const warnEl = document.getElementById(`warn-${name}`);

      if (delta === 1) {
        if (count >= 3) {
          warnEl.textContent = "❌ You can only add up to 3";
          return;
        }
        cart.push({ name, price });
      } else if (delta === -1 && count > 0) {
        const index = cart.findIndex(item => item.name === name);
        if (index !== -1) cart.splice(index, 1);
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      count = cart.filter(item => item.name === name).length;

      const controlDiv = document.getElementById(`control-${name}`);
      if (count === 0) {
        controlDiv.innerHTML = `<button class="add-btn" onclick="startCounter('${name}', ${price})">Add to Cart</button>`;
        warnEl.textContent = "";
      } else {
        document.getElementById(`count-${name}`).textContent = count;
        warnEl.textContent = "";
      }
    }

    loadFruits();
  </script>
</body>
</html>
