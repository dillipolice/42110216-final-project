<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    marquee {
      background-color: #f57c00;
      color: white;
      padding: 10px;
      font-weight: bold;
      font-size: 16px;
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .form-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }
     input[type="name"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }
     input[type="phonenumber"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }
    

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #f57c00;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .back {
      text-align: center;
      margin-top: 15px;
    }

    .back a {
      color: #f57c00;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <marquee behavior="scroll" direction="left">
    Register New User Account – Only Users Can Create Accounts
  </marquee>

  <div class="container">
    <div class="form-box">
      <h2>Create Account</h2>
      <form>
        <input type="name" placeholder="Enter name" required><br>
        <input type="phonenumber" placeholder="Enter phone number" required><br>
        <input type="email" placeholder="Enter Email" required><br>
        <input type="password" placeholder="Enter Password" required><br>
        <input type="submit" value="Register">
      </form>
      <div class="back">
        <a href="USER.html"> Back to Dashboard</a>
      </div>
    </div>
  </div>

</body>
</html>
