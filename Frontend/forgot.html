<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    marquee {
      background-color: #ff6f00;
      color: white;
      padding: 10px;
      font-weight: bold;
      font-size: 16px;
    }

    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .form-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #f57c00;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    input[type="submit"]:hover {
      background: #e65c00;
    }

    @media (max-width: 480px) {
      .form-box {
        padding: 25px 20px;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <marquee behavior="scroll" direction="left">
    Reset your password by entering a new one below.
  </marquee>

  <div class="container">
    <div class="form-box">
      <h2>Reset Password</h2>
      <form onsubmit="return validatePassword()">
        <input type="password" id="newPassword" placeholder="New Password" required>
        <input type="password" id="confirmPassword" placeholder="Retype Password" required>
        <input type="submit" value="Submit">
      </form>
    </div>
  </div>

  <script>
    function validatePassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        alert("Passwords do not match. Please try again.");
        return false;
      }

      // You can add password strength validation here if needed
      alert("Password reset successfully!");
      return true; // Continue form submission or AJAX request
    }
  </script>

</body>
</html>
